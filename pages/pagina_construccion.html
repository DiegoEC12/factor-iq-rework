<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="../assets/icon/Isotipo IQ.png">
    <link href="../assets/css/output.css" rel="stylesheet">
    <title>Pagina en Construccion - Factor IQ</title>
    <style>
        /* Aquí sí puedes aplicar todo el CSS que quieras */
        dialog {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            border-radius: 10px;
            border: 2px solid #3498db;
            padding: 20px;
            font-family: Arial;
        }

        dialog::backdrop {
            background: rgba(0, 0, 0, 0.5);
            /* Oscurece el fondo */
        }
    </style>
</head>

<body class="font-family">
    <main>
        <!--pagina en construccion -->
        <div class="flex items-center justify-center min-h-[90vh] bg-gray-100">
            <div class="text-center p-4 md:p-0">
                <h1 class="md:text-4xl text-2xl lg:text-6xl font-bold text-gray-800 mb-4">Página en Construcción</h1>
                <p class="md:text-lg text-sm lg:text-xl text-gray-600 mb-8">¡Estamos trabajando en algo especial! Vuelve
                    pronto para
                    descubrirlo.</p>
                <div>
                    <img src="../assets/video/Work Create GIF by Pudgy Penguins.gif" alt=""
                        class="h-48 w-auto mx-auto mt-8 rounded-full overflow-hidden">
                </div>

                <div class="mt-8">
                    <a href="../index.html" class="text-primary hover:underline font-medium">Volver al Inicio</a>
                </div>
            </div>
        </div>
        <dialog id="miAlerta" class="relative p-4">
            <p class="text-gray-800 p-4">
                Se enviarion los datos correctamente, nos pondremos en contacto contigo lo antes posible, Gracias.
            </p>
            <button class="cursor-pointer hover:bg-red-600 absolute top-2 right-2 bg-red-500 text-xs w-6 h-6  text-white rounded" id="cerrarAlerta">X</button>
        </dialog>
        <button class="bg-blue-500 text-white py-2 px-4 rounded" id="btnMostrar">
            Mostrar Alerta
        </button>
    </main>

    <script>
        var btnMostrar = document.getElementById('btnMostrar');
        btnMostrar.addEventListener('click', mostrarAlerta);
        var btnCerrar = document.getElementById('cerrarAlerta');
        btnCerrar.addEventListener('click', cerrarAlerta);
        function mostrarAlerta() {
            var openAlerta = document.getElementById('miAlerta');
            openAlerta.showModal();
        }
        function cerrarAlerta() {
            var closeAlerta = document.getElementById('miAlerta');
            closeAlerta.close();
        }
    </script>
    <script src="../assets/js/animations.js"></script>
</body>

</html>
