                <h1
                    class="text-white text-5xl lg:text-6xl font-extrabold leading-tight tracking-tight mb-6 drop-shadow-md uppercase border-l-4 border-red-500 pl-4">

                <div class="w-12 h-12 rounded-xl bg-secondary flex items-center justify-center text-white shadow-lg">

                <div>
                    <p class="text-[10px] uppercase tracking-tighter text-white font-bold leading-none mb-1">Acceso

        <!-- Columna del Formulario -->
        <div
            class="select-none w-full lg:w-7/12 bg-primary/50 lg:bg-white flex flex-col justify-center px-6 py-12 md:px-16 lg:px-24 animate-on-scroll">
            <div class="max-w-md mx-auto w-full ">

                <!-- Logo Mobile -->
                <div class="lg:hidden flex justify-center mb-12">
                    <a href="index.html">
                        <img src="../assets/img/logo-transparent-white.png" alt="Logo IBP" class="h-12 w-auto"/>
                    </a>
                </div>

                <div class="mb-10 mt-20">
                    <h2 class="text-3xl font-extrabold text-white lg:text-slate-900 tracking-tight mb-2">Iniciar Sesión

                    <p class="text-slate-100 lg:text-slate-500 font-medium">Bienvenido de nuevo. Por favor ingresa tus
                        credenciales.</p>
                </div>

                <form id="formLogin" class="space-y-6" action="" method="POST">
                    <!-- Identidad -->
                    <div class="group">
                        <label
                            class="block text-xs font-bold text-white lg:text-primary uppercase tracking-widest mb-3 ml-1">Usuario
                            (Correo o DNI)</label>
                        <div class="relative">
                            <div
                                class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400 group-focus-within:text-primary transition-colors">
                                <span class="icon-[material-symbols--person]"></span>
                            </div>
                            <input
                                class="w-full bg-slate-50 border border-slate-200 rounded-2xl py-4 pl-12 pr-4 text-slate-900 placeholder:text-slate-400 focus:bg-white focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all outline-none"
                                placeholder="Ingresa tu correo o DNI" type="text" name="usuario" />
                        </div>
                    </div>

                    <!-- Password -->
                    <div class="group">
                        <div class="flex justify-between items-center mb-3 px-1">
                            <label
                                class="block text-xs font-bold text-white lg:text-primary uppercase tracking-widest">Contraseña</label>
                            <!--<a class="text-xs font-bold text-white lg:text-accent lg:hover:text-red-500 lg:hover:underline hover:text-white hover:underline transition-colors"
                                href="forgot-password.html">¿Olvidaste tu contraseña?</a>-->
                        </div>
                        <div class="relative">
                            <div
                                class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400 group-focus-within:text-primary transition-colors">
                                <span class="icon-[material-symbols--lock]"></span>
                            </div>
                            <input
                                class="w-full bg-slate-50 border border-slate-200 rounded-2xl py-4 pl-12 pr-4 text-slate-900 placeholder:text-slate-400 focus:bg-white focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all outline-none"
                                placeholder="••••••••" type="password" name="password" />
                        </div>
                    </div>

                    <!-- Submit Button -->
                    <div class="pt-4">
                        <button id="btnLogin"
                            class="w-full lg:bg-[linear-gradient(135deg,#1B2447_0%,#3D5BB8_100%)] lg:hover:bg-primary lg:hover:text-white text-white py-4 rounded-full font-bold text-base tracking-wide shadow-sm shadow-white lg:shadow-lg lg:shadow-blue-500/30 hover:scale-[1.02] active:scale-[0.98] transition-all flex justify-center items-center gap-2 cursor-pointer"
                            type="submit">
                            Ingresar
                            <span class="icon-[material-symbols--login] text-lg"></span>
                        </button>
                    </div>
                </form>

                <div class="mt-8 text-center">
                    <p class="text-white lg:text-slate-500 text-sm">
                        Aun no eres un cliente
                        <a class="text-white lg:text-accent font-extrabold hover:text-secondary lg:hover:text-red-600 hover:underline ml-1 transition-colors"

                <!-- Footer Legal -->

                    class="mt-15 pt-8 border-t border-slate-100 flex flex-col sm:flex-row justify-between items-center text-[10px] font-bold uppercase tracking-widest text-white lg:text-slate-400 gap-4">

        <!-- Componente de Alerta de error -->
        <dialog id="errorAlert" class="fixed flex bottom-0 left-0 m-4 items-center gap-3 bg-red-500 text-white px-5 py-3 rounded-xl shadow-lg border-0
         opacity-0 translate-y-[-20px] transition-[opacity,transform,display,overlay] duration-500 allow-discrete
         open:opacity-100 open:translate-y-0
         starting:open:opacity-0 starting:open:translate-y-[-20px]">

            <span class="icon-[material-symbols--check-circle] text-xl"></span>
            <!-- Texto -->
            <span class="font-medium text-sm"> Por favor ingresa tu usuario y contraseña.</span>
        </dialog>
    </main>

    <script src="../assets/js/menu.js"></script>
    <script src="../assets/js/animations.js"></script>
    <script>
        const formLogin = document.getElementById('formLogin');
        const btnLogin = document.getElementById('btnLogin');
        const errorAlert = document.getElementById('errorAlert');
        const alertText = errorAlert.querySelector('span:last-child');

        formLogin.addEventListener('submit', handleSubmit);

        function handleSubmit(event) {
            event.preventDefault();

            const inputUsuario = formLogin.querySelector('input[name="usuario"]');
            const inputPassword = formLogin.querySelector('input[name="password"]');

            if (inputUsuario.value.trim() === '' || inputPassword.value.trim() === '') {
                showAlert('Por favor ingresa tu usuario y contraseña.');
            } else {
                showAlert('Datos incorrectos. Intenta nuevamente o comunicate con soporte.');
            }
        }

        function showAlert(message) {
            formLogin.reset();
            alertText.textContent = message;
            errorAlert.show();

            setTimeout(() => {
                errorAlert.close();
            }, 3000);
        }
    </script>
